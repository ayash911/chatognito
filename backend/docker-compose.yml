services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chatognito
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatognito_auth
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
