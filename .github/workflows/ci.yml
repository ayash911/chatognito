name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: chatognito
          POSTGRES_PASSWORD: password
          POSTGRES_DB: chatognito_auth
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Database Client
        run: npm run db:generate

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://chatognito:password@localhost:5434/chatognito_auth?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret
