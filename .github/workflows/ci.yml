name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: chatognito
          POSTGRES_PASSWORD: password
          POSTGRES_DB: chatognito_auth
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Database Client
        run: npm run db:generate

      - name: Push Database Schema
        run: npm run db:push
        env:
          DATABASE_URL: postgresql://chatognito:password@localhost:5434/chatognito_auth?schema=public

      - name: Build Packages
        run: npm run build --workspaces --if-present

      - name: Run Linter
        run: npm run lint

      - name: Start Auth Service
        run: |
          cd backend/services/auth
          nohup npx ts-node src/index.ts > auth.log 2>&1 &
          npx wait-on http://localhost:8080/api/v1/auth/login --timeout 30000
        env:
          DATABASE_URL: postgresql://chatognito:password@localhost:5434/chatognito_auth?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret
          PORT: 8080

      - name: Run Tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://chatognito:password@localhost:5434/chatognito_auth?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret
          API_URL: http://localhost:8080
